<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<title>Тёмная Дуэль</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,500&family=Playfair+Display:wght@700&family=Manrope:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="/socket.io/socket.io.js"></script>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<audio id="bgm" src="assets/sounds/music.mp3" loop preload="auto"></audio>

<section id="intro" class="screen active">
  <div class="intro-layer" data-layer="1"><img src="assets/intro/panel1.png" alt=""/></div>
  <div class="intro-hint">тапни, чтобы продолжить</div>
</section>

<section id="menu" class="screen">
  <div class="menu-bg"></div>
  <header class="menu-header">
    <div class="logo-glyph">✦</div>
    <h1 class="game-title">Тёмная<br/>Дуэль</h1>
  </header>
  <div class="menu-actions">
    <button class="btn btn-primary" id="btn-invite"><span>Пригласить друга</span></button>
  </div>
</section>

<section id="game" class="screen">
  <div class="table-bg"></div>

  <div class="g-half g-top">
    <div class="g-player-bar">
      <div class="g-avatar" id="opp-avatar"></div>
      <div class="g-name" id="opp-name">Соперник</div>
    </div>
    <div class="g-card-center" id="opp-card-zone"></div>
    <div class="g-discard-row" id="opp-discard"></div>
  </div>

  <div class="g-middle">
    <div class="g-log-strip" id="log-strip">
      <div class="g-log-lines">
        <div class="g-log-line" id="log-line-1">—</div>
      </div>
      <button class="g-deck-btn" id="deck-btn">🂠 <span id="deck-count-badge">16</span></button>
    </div>
  </div>

  <div class="g-half g-bottom">
    <div class="g-discard-row" id="me-discard"></div>
    <div class="g-card-center" id="my-card-zone"></div>
    <div class="g-player-bar">
      <div class="g-avatar" id="me-avatar"></div>
      <div class="g-name" id="me-name">Вы</div>
    </div>
  </div>

  <div class="overlay card-zoom" id="card-zoom">
    <div class="cz-inner">
      <div class="cz-card" id="cz-card-img"></div>
      <div class="cz-info">
        <div class="cz-name" id="cz-name"></div>
        <div class="cz-desc" id="cz-desc"></div>
      </div>
    </div>
  </div>

  <div class="overlay peek-overlay" id="peek-overlay">
    <div class="am-inner">
      <div class="am-title" id="peek-title">У соперника</div>
      <div class="peek-card-wrap" id="peek-card"></div>
      <div class="peek-info">
          <div class="cz-name" id="peek-card-name" style="font-size: 18px;"></div>
          <div class="cz-desc" id="peek-card-desc" style="font-size: 12px; max-width: 240px;"></div>
      </div>
      <button class="btn btn-primary" id="peek-close" style="margin-top: 15px;">Закрыть</button>
    </div>
  </div>

  <div class="overlay action-modal" id="action-modal">
    <div class="am-inner">
      <div class="am-title">Назови карту</div>
      <div class="am-grid" id="action-options"></div>
    </div>
  </div>
</section>

<script src="app.js"></script>
</body>
</html>
